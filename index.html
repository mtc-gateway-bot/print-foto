<!DOCTYPE html>
<html>
<head>
    <title>Aplikasi Print MTC Lampung</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { background: #0084ff; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 16px; cursor: pointer; width: 100%; }
        input { margin: 20px 0; }
        #log { margin-top: 20px; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🖨️ Kirim Foto ke Printer</h2>
        <input type="file" id="foto" accept="image/*" capture="camera">
        <button id="btnKirim">KIRIM KE LAMPUNG</button>
        <div id="log">Siap mengirim...</div>
    </div>

    <script>
        // DATA IDENTIK DENGAN PYTHON BAPAK
        const TKN = "8709520466:AAHK1_zLJQGsTWt5jzc_of9-pPQVI3w9i-4";
        const CID = "683730329";

        const btn = document.getElementById('btnKirim');
        const log = document.getElementById('log');

        btn.onclick = async () => {
            const fileInput = document.getElementById('foto');
            if (!fileInput.files[0]) return alert("Pilih atau ambil foto dulu!");

            btn.disabled = true;
            btn.innerText = "⏳ Mengirim...";
            log.innerText = "Menghubungi Server Telegram...";

            const fd = new FormData();
            fd.append('chat_id', CID);
            fd.append('document', fileInput.files[0]);

            try {
                const res = await fetch(`https://api.telegram.org/bot${TKN}/sendDocument`, {
                    method: 'POST',
                    body: fd
                });
                const data = await res.json();
                
                if (data.ok) {
                    log.innerText = "✅ BERHASIL! Menunggu Printer merespon...";
                    btn.style.background = "#28a745";
                } else {
                    log.innerText = "❌ GAGAL: " + data.description;
                }
            } catch (e) {
                log.innerText = "❌ ERROR KONEKSI: Pastikan internet aktif.";
            } finally {
                btn.disabled = false;
                btn.innerText = "KIRIM KE LAMPUNG";
            }
        }
    </script>
</body>
</html>
