<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Cetak Foto MTC</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; background: #e9ecef; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); max-width: 400px; margin: auto; }
        h2 { color: #0088cc; margin-bottom: 5px; }
        #preview { width: 100%; border-radius: 8px; margin-top: 15px; display: none; border: 2px dashed #0088cc; }
        select, input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        button { background: #0088cc; color: white; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; }
        button:active { transform: scale(0.98); background: #006699; }
        button:disabled { background: #ccc; }
        #status { font-weight: bold; margin-top: 15px; min-height: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Pola Print Foto</h2>
    <p style="font-size: 14px; color: #666;">Kirim foto ke Epson L3210 (Online)</p>
    
    <input type="file" id="fileInput" accept="image/*">
    
    <select id="sizeSelect">
        <option value="Full">Ukuran Asli</option>
        <option value="2x3">Pas Foto 2x3</option>
        <option value="3x4">Pas Foto 3x4</option>
        <option value="4x6">Pas Foto 4x6</option>
    </select>

    <img id="preview" alt="Preview">
    
    <button id="sendBtn">KIRIM KE PRINTER</button>
    <p id="status"></p>
</div>

<script>
    // Konfigurasi Utama
    const token = '8774147483:AAGYMO63_xa0qd1YmCHINPNi_Vz3DChQoQc';
    const chat_id = '683738329'; 

    const fileInput = document.getElementById('fileInput');
    const sizeSelect = document.getElementById('sizeSelect');
    const sendBtn = document.getElementById('sendBtn');
    const status = document.getElementById('status');
    const preview = document.getElementById('preview');

    fileInput.onchange = function(e) {
        if (e.target.files && e.target.files[0]) {
            const reader = new FileReader();
            reader.onload = function(event) {
                preview.src = event.target.result;
                preview.style.display = 'block';
                status.innerText = "Foto siap dikirim.";
                status.style.color = "black";
            }
            reader.readAsDataURL(e.target.files[0]);
        }
    };

    sendBtn.onclick = async function() {
        const file = fileInput.files[0];
        if (!file) return alert('Silakan pilih foto terlebih dahulu!');
        
        status.innerText = "Sedang mengunggah...";
        status.style.color = "orange";
        sendBtn.disabled = true;

        const formData = new FormData();
        formData.append('chat_id', chat_id);
        formData.append('photo', file);
        formData.append('caption', "🖨️ PESANAN CETAK\nUkuran: " + sizeSelect.value + "\nStatus: Menunggu Antrean");

        try {
            const response = await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                method: 'POST',
                body: formData
            });
            
            const result = await response.json();

            if (response.ok) {
                status.innerText = "✅ BERHASIL! Cek Telegram kamu.";
                status.style.color = "green";
                fileInput.value = ""; // Reset input
                preview.style.display = "none";
            } else {
                // Memberikan pesan error lebih jelas
                status.innerText = "❌ Gagal: " + (result.description || "Terjadi kesalahan");
                status.style.color = "red";
                console.error(result);
            }
        } catch (err) {
            status.innerText = "❌ Koneksi Error: Pastikan internet aktif.";
            status.style.color = "red";
        } finally {
            sendBtn.disabled = false;
        }
    };
</script>

</body>
</html>
