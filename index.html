<!DOCTYPE html>
<html>
<head>
    <title>Kirim Foto MTC</title>
</head>
<body>
    <h2>Kirim Foto ke Printer</h2>
    
    <input type="file" id="inputFoto" accept="image/*">
    <br><br>
    
    <button id="btnKirim" style="height:50px; width:200px;">KIRIM SEKARANG</button>
    
    <p id="status">Status: Standby</p>

    <script>
        const TKN = "8774147483:AAGYMO63_xa0qd1YmCHINPNi_Vz3DChQoQc";
        const CID = "683730329";

        document.getElementById('btnKirim').onclick = async () => {
            const foto = document.getElementById('inputFoto').files[0];
            const info = document.getElementById('status');

            if (!foto) return alert("Pilih fotonya dulu Pak!");

            info.innerText = "Sedang mengirim...";
            
            const fd = new FormData();
            fd.append('chat_id', CID);
            fd.append('photo', foto);

            try {
                const res = await fetch(`https://api.telegram.org/bot${TKN}/sendPhoto`, {
                    method: 'POST',
                    body: fd
                });
                const data = await res.json();
                if (data.ok) {
                    info.innerText = "✅ Berhasil Terkirim!";
                } else {
                    info.innerText = "❌ Gagal: " + data.description;
                }
            } catch (e) {
                info.innerText = "❌ Error Koneksi";
            }
        };
    </script>
</body>
</html>
