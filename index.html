<!DOCTYPE html>
<html>
<body>
    <h2>Tes Kirim Foto MTC</h2>
    
    <input type="file" id="pilihFoto" accept="image/*"><br><br>
    
    <button id="gasKirim" style="padding: 10px 20px;">KIRIM KE PRINTER</button>
    
    <p id="info">Status: Siap.</p>

    <script>
        const TKN = "8774147483:AAGYMO63_xa0qd1YmCHINPNi_Vz3DChQoQc";
        const CID = "683730329";

        document.getElementById('gasKirim').onclick = async () => {
            const foto = document.getElementById('pilihFoto').files[0];
            const info = document.getElementById('info');

            if (!foto) return alert("Pilih foto dulu Pak!");

            info.innerText = "Sedang mengirim...";
            
            const fd = new FormData();
            fd.append('chat_id', CID);
            fd.append('photo', foto);
            fd.append('caption', 'full'); // Default ukuran full

            try {
                // Tambahkan timestamp agar tidak dianggap cache oleh Telegram
                const response = await fetch(`https://api.telegram.org/bot${TKN}/sendPhoto?t=${Date.now()}`, {
                    method: 'POST',
                    body: fd
                });
                
                const hasil = await response.json();
                if (hasil.ok) {
                    info.innerText = "✅ TERKIRIM KE TELEGRAM! Cek CMD.";
                } else {
                    info.innerText = "❌ GAGAL: " + hasil.description;
                }
            } catch (err) {
                info.innerText = "❌ Koneksi Bermasalah.";
            }
        };
    </script>
</body>
</html>
