<!DOCTYPE html>
<html>
<head>
    <title>MTC PRINT</title>
</head>
<body>
    <h3>Tes Cetak MTC Lampung</h3>
    <input type="file" id="pilih" accept="image/*">
    <br><br>
    <button id="kirim" style="width:200px; height:50px;">KIRIM KE PRINTER</button>
    <p id="pesan">Status: Siap</p>

    <script>
        const TKN = "8774147483:AAGYMO63_xa0qd1YmCHINPNi_Vz3DChQoQc";
        const CID = "683730329";

        document.getElementById('kirim').onclick = async () => {
            const file = document.getElementById('pilih').files[0];
            if (!file) return alert("Pilih foto dulu!");

            document.getElementById('pesan').innerText = "Sedang mengirim...";
            
            const fd = new FormData();
            fd.append('chat_id', CID);
            fd.append('photo', file);

            try {
                // Menambahkan mode cors agar diizinkan oleh GitHub Pages
                const res = await fetch(`https://api.telegram.org/bot${TKN}/sendPhoto`, {
                    method: 'POST',
                    body: fd,
                    mode: 'cors' 
                });
                const data = await res.json();
                if (data.ok) {
                    document.getElementById('pesan').innerText = "✅ TERKIRIM! Cek CMD Python.";
                } else {
                    document.getElementById('pesan').innerText = "❌ GAGAL: " + data.description;
                }
            } catch (e) {
                document.getElementById('pesan').innerText = "❌ ERROR: Masalah Jaringan/CORS";
            }
        };
    </script>
</body>
</html>
